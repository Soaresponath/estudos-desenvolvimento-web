<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medidor de Barulho da Turma</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #dff7ff, #f8e8ff);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      background: white;
      border-radius: 30px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      text-align: center;
    }

    h1 {
      color: #2e6b2e;
      font-size: 2.3rem;
      margin-bottom: 10px;
    }

    .subtitulo {
      color: #555;
      font-size: 1.1rem;
      margin-bottom: 25px;
    }

    .monster-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      margin-bottom: 25px;
    }

    .monster-box {
      position: relative;
      width: 320px;
      max-width: 90%;
      transition: 0.3s ease;
    }

    .monster-box img {
      width: 100%;
      display: block;
      transition: 0.3s ease;
    }

    .zzz {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 2rem;
      font-weight: bold;
      color: #4b2e83;
      display: none;
      animation: flutuar 1.2s infinite alternate;
    }

    .olhos-fechados {
      position: absolute;
      top: 88px;
      left: 50%;
      transform: translateX(-50%);
      width: 145px;
      display: none;
      justify-content: space-between;
      pointer-events: none;
    }

    .olho-fechado {
      width: 48px;
      height: 14px;
      border-top: 5px solid #222;
      border-radius: 50%;
    }

    .dormindo img {
      filter: brightness(0.78) saturate(0.8);
      transform: translateY(10px);
    }

    .dormindo .zzz {
      display: block;
    }

    .dormindo .olhos-fechados {
      display: flex;
    }

    .acordado img {
      filter: none;
      transform: scale(1.02);
    }

    .barulhento img {
      animation: shake 0.2s infinite;
      filter: saturate(1.15) brightness(1.05);
    }

    .status {
      font-size: 1.6rem;
      font-weight: bold;
      color: #222;
      min-height: 40px;
    }

    .nivel-texto {
      font-size: 1.1rem;
      color: #444;
    }

    .cronometro-box {
      background: #eef2ff;
      color: #312e81;
      padding: 12px 22px;
      border-radius: 18px;
      font-size: 1.2rem;
      display: inline-flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      margin-top: 8px;
    }

    .cronometro-box strong {
      font-size: 1.5rem;
    }

    .bar-box {
      width: 100%;
      height: 40px;
      background: #eee;
      border-radius: 30px;
      overflow: hidden;
      margin: 20px 0;
      border: 2px solid #ddd;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: #22c55e;
      border-radius: 30px;
      transition: width 0.15s linear, background 0.3s ease;
    }

    .controles {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    button {
      border: none;
      padding: 14px 22px;
      border-radius: 18px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      transform: scale(1.04);
    }

    .btn-start {
      background: #4ade80;
      color: #064e3b;
    }

    .btn-stop {
      background: #f87171;
      color: #7f1d1d;
    }

    .btn-reset {
      background: #93c5fd;
      color: #1e3a8a;
    }

    .config {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      margin-top: 20px;
      background: #f7f7ff;
      border-radius: 20px;
      padding: 18px;
    }

    .config label {
      display: block;
      font-weight: bold;
      color: #2e6b2e;
      margin-bottom: 8px;
    }

    input[type="range"] {
      width: 100%;
    }

    .dica {
      margin-top: 20px;
      background: #fff7cc;
      padding: 15px;
      border-radius: 18px;
      color: #5c4300;
      font-size: 1rem;
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      50% { transform: translateX(4px); }
      75% { transform: translateX(-4px); }
      100% { transform: translateX(0); }
    }

    @keyframes flutuar {
      from { transform: translateY(0); opacity: 0.7; }
      to { transform: translateY(-8px); opacity: 1; }
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 1.8rem;
      }

      .status {
        font-size: 1.3rem;
      }

      .olhos-fechados {
        top: 80px;
        width: 120px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Medidor de Barulho da Turma</h1>
    <p class="subtitulo">Quando a sala está silenciosa, o monstrinho dorme. Quando o barulho aumenta, ele acorda!</p>

    <section class="monster-area">
      <div id="monsterBox" class="monster-box dormindo">
        <img id="monsterImg" src="monstro-verde.png" alt="Monstro verde" />
        <div class="zzz">Zzz...</div>

        <div class="olhos-fechados">
          <div class="olho-fechado"></div>
          <div class="olho-fechado"></div>
        </div>
      </div>

      <div id="status" class="status">Clique em iniciar</div>
      <div id="nivelTexto" class="nivel-texto">Nível de som: 0%</div>

      <div class="cronometro-box">
        <span>Tempo de uso:</span>
        <strong id="cronometro">00:00</strong>
      </div>
    </section>

    <div class="bar-box">
      <div id="bar" class="bar"></div>
    </div>

    <div class="controles">
      <button class="btn-start" onclick="iniciarMedidor()">Iniciar medidor</button>
      <button class="btn-stop" onclick="pararMedidor()">Parar</button>
      <button class="btn-reset" onclick="resetarMedidor()">Resetar</button>
    </div>

    <section class="config">
      <div>
        <label for="limiteMedio">Limite amarelo</label>
        <input id="limiteMedio" type="range" min="10" max="80" value="35" />
        <span id="valorMedio">35%</span>
      </div>

      <div>
        <label for="limiteAlto">Limite vermelho</label>
        <input id="limiteAlto" type="range" min="20" max="100" value="65" />
        <span id="valorAlto">65%</span>
      </div>
    </section>

    <p class="dica">
      Verde = silêncio bom. Amarelo = atenção. Vermelho = baixar a voz.
    </p>
  </main>

  <script>
    let audioContext;
    let analyser;
    let microphone;
    let dataArray;
    let animationId;
    let streamAtual;
    let segundos = 0;
    let intervaloCronometro;

    const monsterBox = document.getElementById("monsterBox");
    const statusText = document.getElementById("status");
    const nivelTexto = document.getElementById("nivelTexto");
    const bar = document.getElementById("bar");
    const cronometro = document.getElementById("cronometro");
    const limiteMedio = document.getElementById("limiteMedio");
    const limiteAlto = document.getElementById("limiteAlto");
    const valorMedio = document.getElementById("valorMedio");
    const valorAlto = document.getElementById("valorAlto");

    limiteMedio.addEventListener("input", () => {
      valorMedio.textContent = limiteMedio.value + "%";
    });

    limiteAlto.addEventListener("input", () => {
      valorAlto.textContent = limiteAlto.value + "%";
    });

    async function iniciarMedidor() {
      try {
        streamAtual = await navigator.mediaDevices.getUserMedia({ audio: true });

        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        microphone = audioContext.createMediaStreamSource(streamAtual);

        analyser.fftSize = 256;
        dataArray = new Uint8Array(analyser.frequencyBinCount);

        microphone.connect(analyser);

        statusText.textContent = "Medindo o som da turma...";
        iniciarCronometro();
        medirSom();
      } catch (erro) {
        statusText.textContent = "Permita o microfone para funcionar";
        alert("Não foi possível acessar o microfone. Verifique a permissão do navegador.");
      }
    }

    function medirSom() {
      analyser.getByteFrequencyData(dataArray);

      let soma = 0;
      for (let i = 0; i < dataArray.length; i++) {
        soma += dataArray[i];
      }

      let media = soma / dataArray.length;
      let nivel = Math.min(100, Math.round((media / 128) * 100));

      atualizarVisual(nivel);
      animationId = requestAnimationFrame(medirSom);
    }

    function atualizarVisual(nivel) {
      const medio = Number(limiteMedio.value);
      const alto = Number(limiteAlto.value);

      bar.style.width = nivel + "%";
      nivelTexto.textContent = "Nível de som: " + nivel + "%";

      monsterBox.className = "monster-box";

      if (nivel < medio) {
        monsterBox.classList.add("dormindo");
        statusText.textContent = "Sala tranquila: o monstrinho está dormindo.";
        bar.style.background = "#22c55e";
      } else if (nivel < alto) {
        monsterBox.classList.add("acordado");
        statusText.textContent = "O monstrinho acordou! Vamos falar mais baixo.";
        bar.style.background = "#facc15";
      } else {
        monsterBox.classList.add("barulhento");
        statusText.textContent = "Muito barulho! O monstrinho assustou!";
        bar.style.background = "#ef4444";
      }
    }

    function iniciarCronometro() {
      clearInterval(intervaloCronometro);

      intervaloCronometro = setInterval(() => {
        segundos++;
        const minutos = Math.floor(segundos / 60);
        const restoSegundos = segundos % 60;

        cronometro.textContent =
          String(minutos).padStart(2, "0") + ":" +
          String(restoSegundos).padStart(2, "0");
      }, 1000);
    }

    function pararMedidor() {
      cancelAnimationFrame(animationId);
      clearInterval(intervaloCronometro);

      if (streamAtual) {
        streamAtual.getTracks().forEach(track => track.stop());
      }

      if (audioContext) {
        audioContext.close();
      }

      statusText.textContent = "Medidor pausado";
    }

    function resetarMedidor() {
      pararMedidor();
      segundos = 0;
      cronometro.textContent = "00:00";
      bar.style.width = "0%";
      bar.style.background = "#22c55e";
      nivelTexto.textContent = "Nível de som: 0%";
      statusText.textContent = "Clique em iniciar";
      monsterBox.className = "monster-box dormindo";
    }
  </script>
</body>
</html>
